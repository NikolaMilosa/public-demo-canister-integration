name: Deploy to staging

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install icp-cli
        run: npm install -g @icp-sdk/icp-cli @icp-sdk/ic-wasm ic-mops

      - name: Import deploy identity
        run: |
          echo "${{ secrets.CANISTER_DEPLOY_KEY }}" > /tmp/deploy-key.pem
          icp identity import deploy-identity --from-pem /tmp/deploy-key.pem --storage plaintext
          rm /tmp/deploy-key.pem

      - name: Write canister ID mappings
        run: |
          mkdir -p .icp/data/mappings
          echo '${{ secrets.CANISTER_ID_MAPPINGS }}' > .icp/data/mappings/staging.ids.json

      - name: Deploy
        run: icp deploy -e staging --identity deploy-identity -y
